<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selenarium — Moon Phase Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#05060f;
  --surface:#080b18;
  --surface2:#0c1022;
  --border:rgba(190,170,110,0.14);
  --border2:rgba(190,170,110,0.08);
  --gold:#c8a84b;
  --gold-dim:rgba(200,168,75,0.18);
  --silver:#c4c0ae;
  --silver-dim:#7a7868;
  --text:#ede9db;
  --text-dim:rgba(237,233,219,0.45);
  --full-glow:rgba(220,210,160,0.18);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif}

/* Stars */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}

/* Layout */
#app{display:flex;height:100vh;position:relative;z-index:1}

/* Moon panel */
#moon-panel{flex:0 0 48%;position:relative;display:flex;flex-direction:column;border-right:1px solid var(--border)}
#moon-canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:grab}
#moon-canvas-wrap:active{cursor:grabbing}
#moon-canvas-wrap canvas{display:block}

/* Phase overlay */
#phase-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:28px 36px 24px;
  background:linear-gradient(to top,rgba(5,6,15,0.97) 0%,rgba(5,6,15,0.7) 60%,transparent 100%);
  pointer-events:none;
}
#phase-name{
  font-family:'Cinzel',serif;
  font-size:clamp(18px,2.2vw,28px);
  font-weight:600;
  color:var(--gold);
  letter-spacing:0.06em;
  line-height:1.2;
}
#phase-date{font-size:clamp(13px,1.2vw,15px);color:var(--silver-dim);margin-top:5px;letter-spacing:0.02em}
#phase-stats{display:flex;gap:28px;margin-top:14px}
.pstat{display:flex;flex-direction:column;gap:3px}
.pstat-label{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim)}
.pstat-val{font-size:clamp(15px,1.6vw,20px);color:var(--text)}

/* Illumination bar */
#illum-bar-wrap{margin-top:14px;display:flex;align-items:center;gap:10px}
#illum-bar-bg{flex:1;height:2px;background:rgba(255,255,255,0.08);border-radius:1px;overflow:hidden}
#illum-bar{height:100%;background:linear-gradient(90deg,var(--silver-dim),var(--gold));border-radius:1px;transition:width 0.6s ease}
#illum-bar-pct{font-size:11px;color:var(--silver-dim);letter-spacing:0.05em;min-width:36px;text-align:right}

/* Drag hint */
#drag-hint{
  position:absolute;top:18px;left:0;right:0;
  text-align:center;font-size:10.5px;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--text-dim);
  transition:opacity 1.2s ease;pointer-events:none;
}

/* Today btn */
#today-btn{
  position:absolute;top:16px;left:16px;
  background:none;border:1px solid var(--border);
  color:var(--text-dim);font-family:'EB Garamond',serif;
  font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  padding:5px 12px;border-radius:20px;cursor:pointer;pointer-events:auto;
  transition:all 0.2s;
}
#today-btn:hover{border-color:var(--gold);color:var(--gold)}

/* Calendar panel */
#cal-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#cal-header{padding:28px 28px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
#app-title{
  font-family:'Cinzel',serif;font-size:10px;
  letter-spacing:0.24em;text-transform:uppercase;
  color:var(--gold);margin-bottom:18px;opacity:0.8;
}
#month-nav{display:flex;align-items:center;gap:12px}
.nav-btn{
  width:30px;height:30px;background:none;
  border:1px solid var(--border);border-radius:50%;
  color:var(--silver-dim);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.18s;flex-shrink:0;
}
.nav-btn:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-dim)}
#month-year{font-family:'Cinzel',serif;font-size:clamp(15px,1.8vw,20px);font-weight:600;flex:1;text-align:center;letter-spacing:0.04em}

/* Phase legend */
#phase-legend{display:flex;gap:16px;padding:10px 28px;border-bottom:1px solid var(--border2);flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);letter-spacing:0.03em}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Calendar body */
#cal-body{flex:1;overflow-y:auto;padding:12px 20px 20px}
#cal-body::-webkit-scrollbar{width:3px}
#cal-body::-webkit-scrollbar-track{background:transparent}
#cal-body::-webkit-scrollbar-thumb{background:rgba(200,168,75,0.25);border-radius:2px}

.day-names{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px}
.dn{text-align:center;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);padding:6px 2px}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day{
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  border-radius:7px;cursor:pointer;
  transition:background 0.13s,border-color 0.13s,box-shadow 0.2s;
  border:1px solid transparent;padding:4px 2px;position:relative;
}
.day:hover{background:rgba(200,168,75,0.07);border-color:rgba(200,168,75,0.22)}
.day.selected{background:rgba(200,168,75,0.13);border-color:var(--gold);box-shadow:0 0 12px rgba(200,168,75,0.12)}
.day.today .dnum{color:var(--gold);font-weight:600}
.day.today::after{
  content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  width:3px;height:3px;border-radius:50%;background:var(--gold);
}
.day.other{opacity:0.22;pointer-events:none}
.day.full-moon{box-shadow:0 0 10px rgba(220,210,160,0.1)}

.dnum{font-size:10.5px;color:var(--silver);font-family:'Cinzel',serif;line-height:1}
.moon-wrap{width:min(36px,calc(100% - 4px));aspect-ratio:1}
.moon-wrap canvas{width:100%;height:100%}
.phase-dot{
  position:absolute;top:3px;right:4px;
  width:5px;height:5px;border-radius:50%;
  transition:opacity 0.2s;
}

/* Tooltip */
#tooltip{
  position:fixed;pointer-events:none;z-index:100;
  background:rgba(8,11,24,0.95);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;font-size:12px;
  color:var(--text);opacity:0;transition:opacity 0.15s;
  backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,0.5);
  white-space:nowrap;
}
#tooltip.show{opacity:1}

/* Mobile */
@media(max-width:680px){
  #app{flex-direction:column}
  #moon-panel{flex:0 0 42vh;border-right:none;border-bottom:1px solid var(--border)}
  #cal-panel{flex:1}
  #phase-stats{gap:16px}
  #phase-overlay{padding:16px 20px 14px}
  #cal-header{padding:14px 16px 10px}
  #cal-body{padding:8px 10px 12px}
  #phase-legend{padding:8px 14px;gap:10px}
  .moon-wrap{width:min(32px,calc(100% - 4px))}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div id="app">

  <!-- ═══ 3D Moon Panel ═══ -->
  <div id="moon-panel">
    <div id="moon-canvas-wrap">
      <div id="drag-hint">drag to rotate &nbsp;·&nbsp; scroll to zoom</div>
      <button id="today-btn">⦿ Today</button>
    </div>
    <div id="phase-overlay">
      <div id="phase-name">Full Moon</div>
      <div id="phase-date">Saturday, April 25, 2026</div>
      <div id="phase-stats">
        <div class="pstat">
          <span class="pstat-label">Illumination</span>
          <span class="pstat-val" id="s-illum">—</span>
        </div>
        <div class="pstat">
          <span class="pstat-label">Moon Age</span>
          <span class="pstat-val" id="s-age">—</span>
        </div>
        <div class="pstat">
          <span class="pstat-label">Cycle</span>
          <span class="pstat-val" id="s-cycle">—</span>
        </div>
      </div>
      <div id="illum-bar-wrap">
        <div id="illum-bar-bg"><div id="illum-bar" style="width:0%"></div></div>
        <span id="illum-bar-pct">—</span>
      </div>
    </div>
  </div>

  <!-- ═══ Calendar Panel ═══ -->
  <div id="cal-panel">
    <div id="cal-header">
      <div id="app-title">✦ &nbsp; Selenarium — Moon Phase Calendar &nbsp; ✦</div>
      <div id="month-nav">
        <button class="nav-btn" id="prev-btn">‹</button>
        <div id="month-year">April 2026</div>
        <button class="nav-btn" id="next-btn">›</button>
      </div>
    </div>
    <div id="phase-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#c8c8a8;box-shadow:0 0 6px rgba(220,210,160,0.5)"></div>Full Moon</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2a2a3a;border:1px solid #555"></div>New Moon</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold);opacity:0.8"></div>Today</div>
    </div>
    <div id="cal-body">
      <div class="day-names">
        <div class="dn">Sun</div><div class="dn">Mon</div><div class="dn">Tue</div>
        <div class="dn">Wed</div><div class="dn">Thu</div><div class="dn">Fri</div><div class="dn">Sat</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  STARS BACKGROUND
// ═══════════════════════════════════════════════
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars=[], W, H;
  function resize(){
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
    stars=[];
    const n = Math.floor(W*H/2200);
    for(let i=0;i<n;i++) stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.3+0.15,
      a:Math.random()*0.65+0.1,
      t:Math.random()*Math.PI*2,
      s:Math.random()*0.0008+0.0002
    });
  }
  function draw(ts){
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      s.t += s.s;
      const a = s.a + Math.sin(s.t)*0.18;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,252,238,${Math.max(0,a)})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize();
  requestAnimationFrame(draw);
})();

// ═══════════════════════════════════════════════
//  MOON PHASE MATH
// ═══════════════════════════════════════════════
const LUNAR = 29.530589;
const NEW_MOON_REF = new Date(Date.UTC(2000,0,6,18,14,0));

function getMoonData(date){
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12);
  const diff = (d - NEW_MOON_REF) / 864e5;
  const cyclePos = ((diff % LUNAR) + LUNAR) % LUNAR;
  const phase = cyclePos / LUNAR; // 0–1
  const illum = 0.5*(1 - Math.cos(phase*Math.PI*2));
  let name;
  if(phase<0.03||phase>=0.97)       name='New Moon';
  else if(phase<0.22)               name='Waxing Crescent';
  else if(phase<0.28)               name='First Quarter';
  else if(phase<0.47)               name='Waxing Gibbous';
  else if(phase<0.53)               name='Full Moon';
  else if(phase<0.72)               name='Waning Gibbous';
  else if(phase<0.78)               name='Last Quarter';
  else                              name='Waning Crescent';
  return {phase, illum, age:cyclePos, name};
}

// ═══════════════════════════════════════════════
//  MINI MOON ICON (Canvas 2D)
// ═══════════════════════════════════════════════
function drawMiniMoon(canvas, phase){
  const sz = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = sz/2 - 0.5;
  const cx = sz/2, cy = sz/2;
  ctx.clearRect(0,0,sz,sz);

  const illum = 0.5*(1 - Math.cos(phase*Math.PI*2));

  // Glow for full/near-full moon
  if(illum > 0.75){
    const gf = (illum-0.75)/0.25;
    const g = ctx.createRadialGradient(cx,cy,r*0.7,cx,cy,r*1.6);
    g.addColorStop(0,`rgba(230,220,170,${gf*0.22})`);
    g.addColorStop(1,'rgba(230,220,170,0)');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(cx,cy,r*1.6,0,Math.PI*2);ctx.fill();
  }

  // Clip to moon circle
  ctx.save();
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();

  const dark='#0b0d1e', lit='#c4c3a4';
  const waxing = phase <= 0.5;
  const ellScale = Math.cos(phase*Math.PI*2); // 1 to -1 to 1

  // Fill dark background
  ctx.fillStyle=dark;
  ctx.fillRect(0,0,sz,sz);

  // Draw lit semicircle
  ctx.fillStyle=lit;
  ctx.beginPath();
  if(waxing){
    ctx.arc(cx,cy,r,-Math.PI/2,Math.PI/2);
  } else {
    ctx.arc(cx,cy,r,Math.PI/2,3*Math.PI/2);
  }
  ctx.closePath();ctx.fill();

  // Draw terminator ellipse
  if(Math.abs(ellScale)>0.015){
    ctx.fillStyle = ellScale>0 ? dark : lit;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.scale(Math.abs(ellScale),1);
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Subtle sphere shading
  const shd = ctx.createRadialGradient(cx*0.65,cy*0.55,0,cx,cy,r);
  shd.addColorStop(0,'rgba(255,255,240,0.08)');
  shd.addColorStop(0.5,'rgba(0,0,0,0)');
  shd.addColorStop(1,'rgba(0,0,20,0.45)');
  ctx.fillStyle=shd;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // Rim
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(180,170,130,0.18)';ctx.lineWidth=0.5;ctx.stroke();
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const TODAY = new Date();
let viewYear = TODAY.getFullYear();
let viewMonth = TODAY.getMonth();
let selectedDate = new Date(TODAY);

// ═══════════════════════════════════════════════
//  CALENDAR RENDER
// ═══════════════════════════════════════════════
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WDAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TOOLTIP = document.getElementById('tooltip');

function renderCalendar(){
  document.getElementById('month-year').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML='';

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMon = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();
  const total = Math.ceil((firstDay+daysInMon)/7)*7;

  for(let i=0;i<total;i++){
    let date, other=false;
    if(i<firstDay){
      date=new Date(viewYear,viewMonth-1,daysInPrev-firstDay+i+1); other=true;
    } else if(i<firstDay+daysInMon){
      date=new Date(viewYear,viewMonth,i-firstDay+1);
    } else {
      date=new Date(viewYear,viewMonth+1,i-firstDay-daysInMon+1); other=true;
    }

    const data = getMoonData(date);
    const isSel = date.toDateString()===selectedDate.toDateString();
    const isToday = date.toDateString()===TODAY.toDateString();
    const isFull = data.phase>=0.47&&data.phase<0.53;
    const isNew = data.phase<0.03||data.phase>=0.97;

    const cell = document.createElement('div');
    cell.className = 'day'+(other?' other':'')+(isSel?' selected':'')+(isToday?' today':'')+(isFull?' full-moon':'');

    // Phase indicator dot for special phases
    if(!other){
      const dot = document.createElement('div');
      dot.className='phase-dot';
      if(isFull){
        dot.style.cssText='background:rgba(220,210,160,0.7);box-shadow:0 0 4px rgba(220,210,160,0.5)';
      } else if(isNew){
        dot.style.cssText='background:rgba(100,100,140,0.5);border:1px solid rgba(140,140,180,0.3)';
      } else if(data.phase>=0.22&&data.phase<0.28){
        dot.style.cssText='background:rgba(180,160,90,0.45)';
      } else if(data.phase>=0.72&&data.phase<0.78){
        dot.style.cssText='background:rgba(180,160,90,0.35)';
      } else {
        dot.style.opacity='0';
      }
      cell.appendChild(dot);
    }

    // Moon icon
    const wrap = document.createElement('div');
    wrap.className='moon-wrap';
    const cv = document.createElement('canvas');
    cv.width=cv.height=60;
    wrap.appendChild(cv);
    drawMiniMoon(cv, data.phase);
    cell.appendChild(wrap);

    // Day number
    const dn = document.createElement('div');
    dn.className='dnum';
    dn.textContent=date.getDate();
    cell.appendChild(dn);

    if(!other){
      cell.addEventListener('click', ()=>{
        selectedDate=new Date(date);
        renderCalendar();
        updatePhasePanel();
      });

      // Tooltip
      cell.addEventListener('mouseenter', e=>{
        TOOLTIP.textContent=`${data.name}  ·  ${Math.round(data.illum*100)}% illuminated`;
        TOOLTIP.classList.add('show');
        posTooltip(e);
      });
      cell.addEventListener('mousemove', posTooltip);
      cell.addEventListener('mouseleave', ()=>TOOLTIP.classList.remove('show'));
    }
    grid.appendChild(cell);
  }
}

function posTooltip(e){
  let x = e.clientX+14, y = e.clientY-36;
  if(x+200>window.innerWidth) x=e.clientX-210;
  if(y<8) y=e.clientY+14;
  TOOLTIP.style.left=x+'px';
  TOOLTIP.style.top=y+'px';
}

document.getElementById('prev-btn').onclick=()=>{
  viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar();
};
document.getElementById('next-btn').onclick=()=>{
  viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar();
};
document.getElementById('today-btn').onclick=()=>{
  selectedDate=new Date(TODAY);
  viewYear=TODAY.getFullYear();
  viewMonth=TODAY.getMonth();
  renderCalendar();
  updatePhasePanel();
};

// ═══════════════════════════════════════════════
//  PHASE PANEL UPDATE
// ═══════════════════════════════════════════════
let moonLight3D = null;
let moonMesh3D = null;

function updatePhasePanel(){
  const d = getMoonData(selectedDate);
  document.getElementById('phase-name').textContent = d.name;
  document.getElementById('phase-date').textContent =
    `${WDAYS[selectedDate.getDay()]}, ${MONTHS[selectedDate.getMonth()]} ${selectedDate.getDate()}, ${selectedDate.getFullYear()}`;
  document.getElementById('s-illum').textContent = `${Math.round(d.illum*100)}%`;
  document.getElementById('s-age').textContent = `${d.age.toFixed(1)} days`;
  document.getElementById('s-cycle').textContent = `${Math.round(d.phase*100)}%`;
  const pct = Math.round(d.illum*100);
  document.getElementById('illum-bar').style.width = pct+'%';
  document.getElementById('illum-bar-pct').textContent = pct+'%';

  // Update 3D moon light
  setMoonLight(d.phase);
}

function setMoonLight(phase){
  if(!moonLight3D) return;
  // Light angle: phase 0 (new)=behind, 0.25=right, 0.5=front (full), 0.75=left
  const angle = Math.PI*(1 - 2*phase);
  moonLight3D.position.set(
    Math.sin(angle)*120,
    15,
    Math.cos(angle)*120
  );
}

// ═══════════════════════════════════════════════
//  THREE.JS 3D MOON
// ═══════════════════════════════════════════════
(function init3D(){
  const wrap = document.getElementById('moon-canvas-wrap');
  let W = wrap.clientWidth, H = wrap.clientHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, W/H, 0.1, 2000);
  camera.position.set(0, 0, 5);

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  wrap.appendChild(renderer.domElement);

  // Textures
  const TL = new THREE.TextureLoader();
  const moonTex = TL.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/lroc_color_poles_1k.jpg');
  const dispMap  = TL.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/ldem_3_8bit.jpg');
  const starsTex = TL.load('https://s3-us-west-2.amazonaws.com/s.cdpn.io/17271/hipp8_s.jpg');

  // Moon mesh
  const geo = new THREE.SphereGeometry(2, 80, 80);
  const mat = new THREE.MeshPhongMaterial({
    map: moonTex,
    displacementMap: dispMap,
    displacementScale: 0.055,
    bumpMap: dispMap,
    bumpScale: 0.045,
    shininess: 0,
    reflectivity: 0,
    specular: new THREE.Color(0x000000),
  });
  moonMesh3D = new THREE.Mesh(geo, mat);
  scene.add(moonMesh3D);

  // Lighting — directional (sun-like, phase-driven)
  moonLight3D = new THREE.DirectionalLight(0xfff8e8, 2.0);
  scene.add(moonLight3D);

  // Subtle fill light (earthshine simulation)
  const fillLight = new THREE.AmbientLight(0x10152a, 0.55);
  scene.add(fillLight);

  // Subtle blue rim from deep space
  const rimLight = new THREE.HemisphereLight(0x0a1030, 0x000000, 0.25);
  scene.add(rimLight);

  // Starfield sphere
  const sgeo = new THREE.SphereGeometry(900, 32, 32);
  const smat = new THREE.MeshBasicMaterial({map:starsTex, side:THREE.BackSide});
  scene.add(new THREE.Mesh(sgeo, smat));

  // ─── Interaction ───────────────────
  let rotY = Math.PI*1.54, rotX = Math.PI*0.02;
  let targetRotY = rotY, targetRotX = rotX;
  let camZ = 5, targetZ = 5;
  let dragging = false, prevX=0, prevY=0;
  let autoSpin = true;
  const hint = document.getElementById('drag-hint');

  const startDrag=(x,y)=>{
    dragging=true; prevX=x; prevY=y;
    if(autoSpin){autoSpin=false;hint.style.opacity='0';}
  };
  const moveDrag=(x,y)=>{
    if(!dragging) return;
    const dx=x-prevX, dy=y-prevY;
    targetRotY += dx*0.007;
    targetRotX = Math.max(-1.3, Math.min(1.3, targetRotX+dy*0.007));
    prevX=x; prevY=y;
  };
  const endDrag=()=>{ dragging=false; };

  renderer.domElement.addEventListener('mousedown',e=>startDrag(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>moveDrag(e.clientX,e.clientY));
  window.addEventListener('mouseup',endDrag);

  renderer.domElement.addEventListener('touchstart',e=>{e.preventDefault();startDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  window.addEventListener('touchmove',e=>{if(!dragging)return;moveDrag(e.touches[0].clientX,e.touches[0].clientY);});
  window.addEventListener('touchend',endDrag);

  renderer.domElement.addEventListener('wheel',e=>{
    e.preventDefault();
    targetZ=Math.max(2.8,Math.min(14,targetZ+e.deltaY*0.009));
  },{passive:false});

  // Fade hint after 3.5s
  setTimeout(()=>hint.style.opacity='0',3500);

  // Resize
  window.addEventListener('resize',()=>{
    W=wrap.clientWidth; H=wrap.clientHeight;
    camera.aspect=W/H;camera.updateProjectionMatrix();
    renderer.setSize(W,H);
  });

  // ─── Animate ───────────────────────
  const clock = new THREE.Clock();
  function animate(){
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    if(autoSpin) targetRotY += 0.0018;
    rotY += (targetRotY-rotY)*0.07;
    rotX += (targetRotX-rotX)*0.07;
    camZ += (targetZ-camZ)*0.07;

    moonMesh3D.rotation.y = rotY;
    moonMesh3D.rotation.x = rotX;
    camera.position.z = camZ;

    renderer.render(scene, camera);
  }
  animate();
})();

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
renderCalendar();

// Wait a tick for Three.js light ref to be set
setTimeout(updatePhasePanel, 50);

// Keyboard navigation
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'){
    selectedDate=new Date(selectedDate);
    selectedDate.setDate(selectedDate.getDate()-1);
    viewYear=selectedDate.getFullYear();
    viewMonth=selectedDate.getMonth();
    renderCalendar();updatePhasePanel();
  } else if(e.key==='ArrowRight'){
    selectedDate=new Date(selectedDate);
    selectedDate.setDate(selectedDate.getDate()+1);
    viewYear=selectedDate.getFullYear();
    viewMonth=selectedDate.getMonth();
    renderCalendar();updatePhasePanel();
  }
});
</script>
